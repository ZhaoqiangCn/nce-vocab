<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>新概念单词岛 · 第一册</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
html,body{height:100%}
body{font-family:"PingFang SC","Microsoft YaHei",system-ui,sans-serif;background:linear-gradient(160deg,#aee8ff 0%,#d8f7e8 60%,#fff6d8 100%);background-attachment:fixed;color:#2b3a55;touch-action:manipulation}
#app{max-width:640px;margin:0 auto;min-height:100%;padding:14px 14px 30px}
.screen{display:none;animation:fadein .25s}
.screen.on{display:block}
@keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1}}
.topbar{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.back{font-size:22px;background:#fff;border:none;border-radius:14px;width:44px;height:44px;box-shadow:0 3px 8px rgba(60,90,140,.12);cursor:pointer}
.topbar h2{font-size:20px;flex:1}
.card{background:#fff;border-radius:22px;padding:18px;box-shadow:0 6px 18px rgba(60,90,140,.10);margin-bottom:14px}
.bigbtn{display:block;width:100%;border:none;border-radius:22px;padding:20px;font-size:22px;font-weight:700;color:#fff;cursor:pointer;box-shadow:0 6px 0 rgba(0,0,0,.12);margin-bottom:14px;text-align:left}
.bigbtn small{display:block;font-size:14px;font-weight:400;opacity:.9;margin-top:4px}
.bigbtn:active{transform:translateY(3px);box-shadow:0 3px 0 rgba(0,0,0,.12)}
.btn-learn{background:linear-gradient(135deg,#ff9a3c,#ff6b6b)}
.btn-review{background:linear-gradient(135deg,#4facfe,#00c6a7)}
.btn-gray{background:#b8c4d8}
.iconrow{display:flex;gap:10px}
.iconbtn{flex:1;background:#fff;border:none;border-radius:18px;padding:12px 6px;font-size:14px;color:#2b3a55;box-shadow:0 4px 10px rgba(60,90,140,.10);cursor:pointer}
.iconbtn span{display:block;font-size:26px;margin-bottom:4px}
.hero{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.hero .fox{font-size:52px}
.hero h1{font-size:22px}
.hero p{font-size:14px;color:#7a89a3;margin-top:3px}
.statchips{display:flex;gap:10px;margin-bottom:14px}
.chip{flex:1;background:#fff;border-radius:18px;padding:10px;text-align:center;box-shadow:0 4px 10px rgba(60,90,140,.10)}
.chip b{display:block;font-size:22px}
.chip i{font-style:normal;font-size:12px;color:#7a89a3}
.lvlbar{background:#e7eef8;border-radius:99px;height:14px;overflow:hidden;margin-top:8px}
.lvlbar div{height:100%;background:linear-gradient(90deg,#ffd34d,#ff9a3c);border-radius:99px;transition:width .4s}
.stage{font-size:15px;font-weight:700;color:#5b6b88;margin:16px 4px 8px}
.unit{display:flex;align-items:center;gap:12px;background:#fff;border-radius:18px;padding:12px 14px;margin-bottom:8px;box-shadow:0 3px 8px rgba(60,90,140,.08);cursor:pointer}
.unit .num{width:44px;height:44px;border-radius:14px;background:#eef4ff;display:flex;align-items:center;justify-content:center;font-weight:800;color:#4a6cf7;flex-shrink:0}
.unit .num.done{background:#ffefc2}
.unit .info{flex:1;min-width:0}
.unit .info b{display:block;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.unit .info i{font-style:normal;font-size:12px;color:#8a97ad}
.ubar{background:#edf1f7;height:8px;border-radius:99px;margin-top:6px;overflow:hidden}
.ubar div{height:100%;background:linear-gradient(90deg,#4facfe,#00c6a7);border-radius:99px}
.unit .st{font-size:20px;flex-shrink:0}
.rec{background:#fff3e0;border:2px dashed #ffb74d;}
/* session */
.sess-top{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.pbar{flex:1;background:#ffffffaa;height:14px;border-radius:99px;overflow:hidden}
.pbar div{height:100%;background:linear-gradient(90deg,#ffd34d,#ff9a3c);transition:width .3s}
.quit{background:#fff;border:none;border-radius:12px;width:40px;height:40px;font-size:18px;cursor:pointer}
.combo{font-weight:800;color:#ff6b2c;min-width:52px;text-align:right;font-size:15px}
/* 闯关地图（大富翁式蛇形棋盘） */
.boardwrap{margin-bottom:12px;padding:4px 2px}
.board{display:grid;gap:5px;width:100%}
.btile{position:relative;aspect-ratio:1;border-radius:10px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:19px;box-shadow:0 2px 5px rgba(60,90,140,.13);transition:transform .2s}
.btile.pad{visibility:hidden;box-shadow:none;background:none}
.btile.done{background:#fff4cf}
.btile.up{opacity:.92}
.btile.up .n{font-size:12px;color:#aebacf;font-weight:800}
.btile.cur{transform:scale(1.12);box-shadow:0 4px 12px rgba(255,150,60,.55);z-index:2;animation:hop .55s}
.btile.start,.btile.finish{background:#dfeeff;font-size:17px}
@keyframes hop{0%{transform:translateY(0) scale(1.12)}40%{transform:translateY(-9px) scale(1.2)}100%{transform:translateY(0) scale(1.12)}}
.qcard{background:#fff;border-radius:24px;padding:22px 16px;text-align:center;box-shadow:0 8px 22px rgba(60,90,140,.12);margin-bottom:12px;position:relative;min-height:170px}
.pos{display:inline-block;background:#eef4ff;color:#4a6cf7;font-size:13px;padding:2px 10px;border-radius:99px;margin-bottom:8px}
.cn{font-size:26px;font-weight:800;line-height:1.35}
.en-big{font-size:40px;font-weight:800;letter-spacing:1px;margin:6px 0}
.spk{background:#e8f6ff;border:none;font-size:24px;width:52px;height:52px;border-radius:50%;cursor:pointer;margin-top:12px}
.tiles{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:18px 0 6px;min-height:52px}
.tile{width:40px;height:50px;border-radius:12px;background:#f0f4fa;border:2px solid #dbe4f0;font-size:26px;font-weight:800;display:flex;align-items:center;justify-content:center;text-transform:lowercase}
.tile.fix{background:#fff;border-style:dashed;color:#9aa8bf;width:26px}
.tile.cur{border-color:#4a6cf7;background:#eef4ff}
.tile.ok{background:#d9f7e5;border-color:#3ecf8e;color:#149c66;animation:pop .3s}
.tile.bad{background:#ffe3e3;border-color:#ff8a8a;color:#e04444;animation:shake .4s}
.tile.ghost{color:#c3cede}
@keyframes pop{50%{transform:scale(1.18)}}
@keyframes shake{25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.fb{min-height:34px;text-align:center;font-size:17px;font-weight:700;margin-bottom:6px}
.fb.good{color:#149c66}.fb.badc{color:#e04444}
.kb{margin-top:4px}
.kbrow{display:flex;justify-content:center;gap:5px;margin-bottom:7px}
.key{flex:1;max-width:56px;height:52px;border:none;border-radius:10px;background:#fff;font-size:20px;font-weight:700;color:#2b3a55;box-shadow:0 3px 0 #ccd6e4;cursor:pointer}
.key:active{transform:translateY(2px);box-shadow:0 1px 0 #ccd6e4}
.key.wide{max-width:86px;background:#ffe9d2}
.srow{display:flex;gap:8px;margin-top:10px}
.sbtn{flex:1;border:none;border-radius:14px;padding:13px;font-size:16px;font-weight:700;cursor:pointer;background:#fff;color:#4a6cf7;box-shadow:0 3px 0 #ccd6e4}
.sbtn.primary{background:linear-gradient(135deg,#4a6cf7,#7a5cff);color:#fff;box-shadow:0 3px 0 #3a55c4}
.xpfloat{position:absolute;right:16px;top:12px;font-weight:800;color:#ff9a3c;font-size:20px;animation:rise 1s forwards;pointer-events:none}
@keyframes rise{to{transform:translateY(-30px);opacity:0}}
/* result */
.result{text-align:center;padding:30px 16px}
.result .big{font-size:64px}
.result h2{margin:10px 0 4px}
.rstats{display:flex;gap:10px;margin:18px 0}
/* stats */
.chart{display:flex;align-items:flex-end;gap:4px;height:110px;padding:6px 2px 0}
.bar{flex:1;background:linear-gradient(180deg,#4facfe,#00c6a7);border-radius:6px 6px 0 0;min-height:3px;position:relative}
.bar i{position:absolute;top:-17px;left:50%;transform:translateX(-50%);font-size:10px;font-style:normal;color:#5b6b88}
.xlabels{display:flex;gap:4px;margin-top:4px}
.xlabels span{flex:1;text-align:center;font-size:9px;color:#8a97ad}
/* badges */
.bgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.badge{background:#fff;border-radius:18px;padding:14px 6px;text-align:center;box-shadow:0 3px 8px rgba(60,90,140,.08)}
.badge span{font-size:34px;display:block;filter:grayscale(1);opacity:.35}
.badge.got span{filter:none;opacity:1}
.badge b{font-size:12px;display:block;margin-top:6px}
.badge i{font-style:normal;font-size:10px;color:#8a97ad}
/* settings */
.setrow{display:flex;align-items:center;justify-content:space-between;padding:12px 2px;border-bottom:1px solid #eef2f8;font-size:16px}
.setrow select,.setrow input[type=range]{font-size:16px}
.danger{color:#e04444}
/* word sheet */
.wline{display:flex;align-items:center;gap:10px;padding:9px 2px;border-bottom:1px solid #f0f3f8;font-size:16px}
.wline .we{font-weight:800;min-width:110px}
.wline .wc{color:#5b6b88;font-size:14px;flex:1}
.wline .ws{border:none;background:#e8f6ff;border-radius:8px;font-size:16px;width:34px;height:30px;cursor:pointer}
.wline .lv{font-size:11px;color:#fff;background:#c3cede;border-radius:8px;padding:2px 6px}
.wline .lv.l1{background:#8fc3ff}.wline .lv.l2{background:#5da9ff}.wline .lv.l3{background:#3ecf8e}.wline .lv.l4{background:#f5b93c}.wline .lv.l5{background:#ff9a3c}
#confetti{position:fixed;inset:0;pointer-events:none;z-index:99}
.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:90px;background:#2b3a55;color:#fff;padding:12px 22px;border-radius:99px;font-size:15px;z-index:100;animation:fadein .3s;box-shadow:0 6px 20px rgba(0,0,0,.25)}
.badgepop{position:fixed;inset:0;background:rgba(30,40,60,.5);display:flex;align-items:center;justify-content:center;z-index:101}
.badgepop .in{background:#fff;border-radius:26px;padding:30px;text-align:center;width:280px;animation:pop .4s}
.badgepop .in span{font-size:70px}
</style>
</head>
<body>
<canvas id="confetti"></canvas>
<div id="app">

<!-- ============ HOME ============ -->
<div class="screen" id="scr-home">
  <div class="hero"><div class="fox">🦊</div>
    <div><h1 id="greet">你好呀！</h1><p id="subgreet">今天也要加油背单词哦</p></div>
  </div>
  <div class="statchips">
    <div class="chip">🔥<b id="c-streak">0</b><i>连续天数</i></div>
    <div class="chip">📖<b id="c-learned">0</b><i>已学单词</i></div>
    <div class="chip">🏅<b id="c-master">0</b><i>已掌握</i></div>
  </div>
  <div class="card">
    <div style="display:flex;justify-content:space-between;font-size:14px"><b id="lvl-name">Lv.1 新手上路</b><span id="lvl-xp" style="color:#8a97ad"></span></div>
    <div class="lvlbar"><div id="lvl-fill" style="width:0%"></div></div>
  </div>
  <button class="bigbtn btn-review" id="btn-review" onclick="startReview()">🔁 复习挑战<small id="due-hint"></small></button>
  <button class="bigbtn btn-learn" id="btn-learn" onclick="learnNext()">📚 学新单词<small id="learn-hint"></small></button>
  <div class="iconrow">
    <button class="iconbtn" onclick="go('units')"><span>🗺️</span>单元地图</button>
    <button class="iconbtn" onclick="go('stats')"><span>📊</span>我的统计</button>
    <button class="iconbtn" onclick="go('badges')"><span>🏆</span>勋章墙</button>
    <button class="iconbtn" onclick="go('settings')"><span>⚙️</span>设置</button>
  </div>
</div>

<!-- ============ UNITS ============ -->
<div class="screen" id="scr-units">
  <div class="topbar"><button class="back" onclick="go('home')">←</button><h2>单元地图 🗺️</h2></div>
  <div id="unit-list"></div>
</div>

<!-- ============ WORD SHEET ============ -->
<div class="screen" id="scr-sheet">
  <div class="topbar"><button class="back" onclick="go('units')">←</button><h2 id="sheet-title"></h2></div>
  <button class="bigbtn btn-learn" id="sheet-learn" style="padding:15px 20px;font-size:18px"></button>
  <div class="card" id="sheet-words"></div>
</div>

<!-- ============ SESSION ============ -->
<div class="screen" id="scr-sess">
  <div class="sess-top">
    <button class="quit" onclick="quitSession()">✕</button>
    <div class="pbar"><div id="sess-fill"></div></div>
    <div class="combo" id="combo-el"></div>
  </div>
  <div class="boardwrap"><div class="board" id="board"></div></div>
  <div class="qcard" id="qcard"></div>
  <div class="fb" id="fb"></div>
  <div id="spell-area">
    <div class="tiles" id="tiles"></div>
    <div class="kb" id="kb"></div>
    <button class="sbtn primary" id="btn-submit" onclick="submitSpell()" style="width:100%;padding:15px;font-size:18px;margin-top:6px">✓ 确定</button>
    <div class="srow">
      <button class="sbtn" id="btn-hint" onclick="useHint()">💡 提示</button>
      <button class="sbtn" onclick="speakCur()">🔊 再听</button>
      <button class="sbtn" id="btn-voice" onclick="onVoice()">🎤 说单词</button>
    </div>
  </div>
  <div id="present-area" style="display:none">
    <button class="sbtn primary" style="width:100%;padding:16px;font-size:18px" onclick="presentDone()">记住了，去拼写 ✏️</button>
  </div>
</div>

<!-- ============ RESULT ============ -->
<div class="screen" id="scr-result">
  <div class="card result">
    <div class="big" id="res-emoji">🎉</div>
    <h2 id="res-title">太棒了！</h2>
    <p id="res-sub" style="color:#7a89a3"></p>
    <div class="rstats">
      <div class="chip">✅<b id="res-right">0</b><i>答对</i></div>
      <div class="chip">❌<b id="res-wrong">0</b><i>答错</i></div>
      <div class="chip">⭐<b id="res-xp">0</b><i>获得经验</i></div>
    </div>
    <button class="sbtn primary" style="width:100%;padding:15px;font-size:17px" onclick="go('home');renderHome()">回到首页 🏠</button>
  </div>
</div>

<!-- ============ STATS ============ -->
<div class="screen" id="scr-stats">
  <div class="topbar"><button class="back" onclick="go('home')">←</button><h2>我的统计 📊</h2></div>
  <div class="statchips">
    <div class="chip">📖<b id="s-learned">0</b><i>已学单词</i></div>
    <div class="chip">🏅<b id="s-master">0</b><i>已掌握</i></div>
    <div class="chip">🎯<b id="s-acc">-</b><i>正确率</i></div>
  </div>
  <div class="statchips">
    <div class="chip">🔥<b id="s-streak">0</b><i>连续天数</i></div>
    <div class="chip">🔁<b id="s-rev">0</b><i>累计复习</i></div>
    <div class="chip">🗺️<b id="s-units">0/72</b><i>完成单元</i></div>
  </div>
  <div class="card">
    <b style="font-size:15px">最近 14 天答题量</b>
    <div class="chart" id="chart"></div>
    <div class="xlabels" id="chart-x"></div>
  </div>
  <div class="card">
    <b style="font-size:15px">全书进度</b>
    <div class="ubar" style="height:14px;margin-top:10px"><div id="s-total-fill"></div></div>
    <p id="s-total-txt" style="font-size:13px;color:#8a97ad;margin-top:6px"></p>
  </div>
</div>

<!-- ============ BADGES ============ -->
<div class="screen" id="scr-badges">
  <div class="topbar"><button class="back" onclick="go('home')">←</button><h2>勋章墙 🏆</h2></div>
  <div class="bgrid" id="badge-grid"></div>
</div>

<!-- ============ SETTINGS ============ -->
<div class="screen" id="scr-settings">
  <div class="topbar"><button class="back" onclick="go('home')">←</button><h2>设置 ⚙️</h2></div>
  <div class="card">
    <div class="setrow"><span>发音语速</span>
      <input type="range" id="set-rate" min="0.5" max="1.1" step="0.05" onchange="S.set.rate=+this.value;save();speak('hello')"></div>
    <div class="setrow"><span>按键音效</span>
      <select id="set-sound" onchange="S.set.sound=this.value=='开';save()"><option>开</option><option>关</option></select></div>
  </div>
  <div class="card">
    <div class="setrow" style="cursor:pointer" onclick="exportData()"><span>📤 导出学习进度（备份）</span><span>›</span></div>
    <div class="setrow" style="cursor:pointer" onclick="document.getElementById('imp').click()"><span>📥 导入学习进度</span><span>›</span></div>
    <input type="file" id="imp" accept=".json" style="display:none" onchange="importData(this)">
    <div class="setrow danger" style="cursor:pointer;border:none" onclick="resetAll()"><span>🗑️ 清空全部进度</span><span>›</span></div>
  </div>
  <p style="font-size:12px;color:#8a97ad;text-align:center">新概念单词岛 v1.0 · 词库：新概念英语第一册（1-144课）</p>
</div>

</div>
<script>

let VOICE=null;
function pickVoice(){const vs=speechSynthesis.getVoices();VOICE=vs.find(v=>v.lang==='en-US')||vs.find(v=>v.lang&&v.lang.startsWith('en'))||null}

  speechSynthesis.cancel();

/* ================= 音效 ================= */
let AC=null;
function beep(type){
  if(!S.set.sound)return;
  try{
    AC=AC||new (window.AudioContext||window.webkitAudioContext)();
    if(AC.state==='suspended')AC.resume();
    const seq=type==='ok'?[[660,0,.09],[880,.09,.12]]:type==='bad'?[[220,0,.18]]:type==='win'?[[523,0,.1],[659,.1,.1],[784,.2,.1],[1047,.3,.25]]:[[500,0,.05]];
    seq.forEach(([f,dl,du])=>{
      const o=AC.createOscillator(),g=AC.createGain();
      o.type='triangle';o.frequency.value=f;o.connect(g);g.connect(AC.destination);
      const t=AC.currentTime+dl;g.gain.setValueAtTime(.18,t);g.gain.exponentialRampToValueAtTime(.001,t+du);
      o.start(t);o.stop(t+du);
    });
  }catch(e){}
}

/* ================= 彩带 ================= */
function confetti(){
  const c=document.getElementById('confetti'),x=c.getContext('2d');
  c.width=innerWidth;c.height=innerHeight;
  const P=[];const colors=['#ff6b6b','#ffd34d','#4facfe','#00c6a7','#b28bff','#ff9a3c'];
  for(let i=0;i<120;i++)P.push({x:Math.random()*c.width,y:-20-Math.random()*c.height*.5,r:4+Math.random()*6,co:colors[i%6],vy:2+Math.random()*3,vx:(Math.random()-.5)*2,a:Math.random()*6});
  let n=0;
  (function f(){
    x.clearRect(0,0,c.width,c.height);
    P.forEach(p=>{p.y+=p.vy;p.x+=p.vx;p.a+=.1;x.save();x.translate(p.x,p.y);x.rotate(p.a);x.fillStyle=p.co;x.fillRect(-p.r/2,-p.r/2,p.r,p.r*.6);x.restore()});
    if(++n<130)requestAnimationFrame(f);else x.clearRect(0,0,c.width,c.height);
  })();
}

let SES=null,IN_SESSION=false;
function startLearn(ui){
  // 整篇课文一次性挑战：本单元全部单词，直接拼写（先在单词表上自学，再一次挑战）
  const u=UNITS[ui];
  const items=u.w.map((w,i)=>({id:ui+'-'+i,w,mode:S.w[ui+'-'+i]?'review':'learn',phase:'spell'}));
  SES={queue:items,total:items.length,right:0,wrong:0,xp:0,mode:'challenge'};
  SES.board=makeBoard(items.length);
  IN_SESSION=true;PENDING_BADGES=[];
  go('sess');nextCard();
}
function startReview(){
  const ids=dueIds();
  if(!ids.length){toast('今天没有要复习的单词哦 👍');return}
  shuffle(ids);
  const items=ids.map(id=>{const[a,b]=id.split('-');return{id,w:UNITS[+a].w[+b],mode:'review',phase:'spell'}});
  SES={queue:items,total:items.length,right:0,wrong:0,xp:0,mode:'review'};
  SES.board=makeBoard(items.length);
  IN_SESSION=true;PENDING_BADGES=[];
  go('sess');nextCard();
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}}
function makeBoard(n){const b=[];for(let i=0;i<n;i++)b.push({type:(i%5===4)?'gift':(i%3===1)?'coin':'word'});return b}
function tileHTML(c,cleared){
  if(c.k==='pad')return '<div class="btile pad"></div>';
  if(c.k==='start')return '<div class="btile start">🚩</div>';
  if(c.k==='finish'){const fin=cleared>=SES.total;return `<div class="btile finish${fin?' cur':''}">${fin?'🦊':'🏁'}</div>`;}
  const i=c.i,t=SES.board[i]||{type:'word'};
  if(i<cleared)return `<div class="btile done">${t.type==='gift'?'🏆':t.type==='coin'?'💰':'⭐'}</div>`;
  if(i===cleared)return '<div class="btile cur">🦊</div>';
  const ic=t.type==='gift'?'🎁':t.type==='coin'?'🪙':`<span class="n">${i+1}</span>`;
  return `<div class="btile up">${ic}</div>`;
}
function renderBoard(){
  const b=document.getElementById('board');if(!b||!SES||!SES.board)return;
  const cleared=SES.total-SES.queue.length;
  const cells=[{k:'start'}];
  for(let i=0;i<SES.total;i++)cells.push({k:'word',i});
  cells.push({k:'finish'});
  const tot=cells.length;
  const cols=tot<=6?tot:tot<=12?6:tot<=24?7:8;
  while(cells.length%cols)cells.push({k:'pad'});
  const rows=cells.length/cols;
  let html='';
  for(let r=0;r<rows;r++){
    let row=cells.slice(r*cols,(r+1)*cols);
    if(r%2===1)row=row.reverse();          // 蛇形绕行，像大富翁棋盘
    html+=row.map(c=>tileHTML(c,cleared)).join('');
  }
  b.style.gridTemplateColumns=`repeat(${cols},1fr)`;
  b.innerHTML=html;
}
function quitSession(){ask('要退出本次练习吗？<br>已完成的进度会保存哦 💾','退出',()=>endSession(true))}

  if(!SES.queue.length){endSession(false);return}
  CUR=SES.queue[0];
  const done=SES.total-SES.queue.filter(q=>!q.counted).length;
  document.getElementById('sess-fill').style.width=(Math.min(done,SES.total)/SES.total*100)+'%';
  document.getElementById('combo-el').textContent=S.combo>=2?`🔥x${S.combo}`:'';
  renderBoard();
  if(CUR.phase==='present')showPresent();else showSpell();
}
function showPresent(){
  const w=CUR.w;
  document.getElementById('qcard').innerHTML=
    `<span class="pos">${w[1]||'词组'}</span><div class="en-big">${w[0]}</div><div class="cn" style="font-size:20px;color:#5b6b88">${w[2]}</div><button class="spk" onclick="speakCur()">🔊</button>`;
  document.getElementById('spell-area').style.display='none';
  document.getElementById('present-area').style.display='block';
  speak(w[0]);
}
function presentDone(){CUR.phase='spell';showSpell()}
function speakCur(){speak(CUR.w[0])}
function showSpell(){
  const w=CUR.w;
  FIRST=CUR.attempted?false:true;HINTS=0;RETRY=CUR.retry||0;
  document.getElementById('qcard').innerHTML=
    `<span class="pos">${w[1]||'词组'}</span><div class="cn">${w[2]}</div><button class="spk" onclick="speakCur()">🔊</button>`;
  document.getElementById('present-area').style.display='none';
  document.getElementById('spell-area').style.display='block';
  ANSWER=w[0];SLOTS=[];POS=-1;
  const box=document.getElementById('tiles');box.innerHTML='';
  [...ANSWER].forEach((ch,i)=>{
    const t=document.createElement('div');
    if(/[a-zA-Z]/.test(ch)){t.className='tile';t.dataset.i=i;SLOTS.push({i,ch,el:t,val:''})}
    else{t.className='tile fix';t.textContent=ch===' '?'␣':ch}
    box.appendChild(t);
  });
  POS=0;markCursor();
  buildKB();
  speak(ANSWER);
}
function markCursor(){SLOTS.forEach((s,j)=>s.el.classList.toggle('cur',j===POS))}
function buildKB(){
  const kb=document.getElementById('kb');
  if(kb.dataset.built)return;
  kb.dataset.built='1';
  const rows=['qwertyuiop','asdfghjkl','zxcvbnm'];
  kb.innerHTML=rows.map((r,ri)=>`<div class="kbrow">${ri===2?'<button class="key wide" data-k="BS">⌫</button>':''}${[...r].map(c=>`<button class="key" data-k="${c}">${c}</button>`).join('')}${ri===2?'<button class="key wide" data-k="BS2">⌫</button>':''}</div>`).join('');
  // 只保留右侧退格
  kb.querySelector('[data-k="BS"]').remove();
  kb.querySelectorAll('.key').forEach(k=>{
    k.addEventListener('pointerdown',e=>{e.preventDefault();onKey(k.dataset.k==='BS2'?'BS':k.dataset.k)});
  });
}
function onKey(k){
  if(!CUR||CUR.phase!=='spell')return;
  beep('tap');
  if(k==='BS'){
    if(POS>0||SLOTS[POS]&&SLOTS[POS].val){
      let j=(SLOTS[POS]&&SLOTS[POS].val)?POS:POS-1;
      if(j>=0){SLOTS[j].val='';SLOTS[j].el.textContent='';SLOTS[j].el.classList.remove('ghost');POS=j;markCursor()}
    }
    return;
  }
  if(POS>=SLOTS.length)return;
  SLOTS[POS].val=k;SLOTS[POS].el.textContent=k;SLOTS[POS].el.classList.remove('ghost');
  POS++;markCursor();
  if(SLOTS.every(s=>s.val))setTimeout(check,120);
}
function useHint(){
  if(!CUR||CUR.phase!=='spell')return;
  if(POS>=SLOTS.length)return;
  HINTS++;
  onKey(SLOTS[POS].ch.toLowerCase());
  document.getElementById('fb').textContent='💡 提示已用，这个词要多练一遍哦';
  document.getElementById('fb').className='fb';
}
function submitSpell(){if(CUR&&CUR.phase==='spell')check();}
function check(){
  if(!CUR||CUR._locked)return;
  CUR._locked=true;
  const ok=SLOTS.every(s=>s.val.toLowerCase()===s.ch.toLowerCase());
  const fb=document.getElementById('fb');
  if(ok){
    SLOTS.forEach(s=>{s.el.classList.remove('cur');s.el.classList.add('ok')});
    beep('ok');
    grade(true);
  }else{
    SLOTS.forEach(s=>{if(s.val.toLowerCase()!==s.ch.toLowerCase())s.el.classList.add('bad');s.el.classList.remove('cur')});
    beep('bad');
    fb.innerHTML=`正确拼写：<b style="font-size:22px">${ANSWER}</b>`;
    fb.className='fb badc';
    speak(ANSWER);
    grade(false);
  }
}
function grade(ok){
  const st=S.w[CUR.id];
  const day=markActivity();
  if(ok){
    const noWrong=!CUR.attempted, clean=noWrong&&HINTS===0;
    S.combo++;S.bestCombo=Math.max(S.bestCombo,S.combo);
    let gain=0;
    if(!CUR.counted){
      CUR.counted=true;
      if(noWrong){SES.right++;day.r++}
      if(CUR.mode==='learn'){
        S.w[CUR.id]={b:1,d:addDays(1),r:1,wr:0};day.n++;gain=10;
      }else if(CUR.mode==='review'){
        S.rev++;day.rv++;
        const nb=clean?Math.min(st.b+1,7):st.b;
        st.b=nb;st.d=addDays(INTERVALS[nb]);st.r++;
        gain=clean?8:4;
      }else{ // quiz
        gain=3;
      }
      if(S.combo>0&&S.combo%5===0){gain+=5;toast(`🔥 ${S.combo} 连对！额外 +5 XP`)}
      const bt=SES.board&&SES.board[SES.total-SES.queue.length];
      if(bt&&bt.type==='gift'){gain+=8;toast('🎁 打开宝箱，+8 XP！')}
      else if(bt&&bt.type==='coin'){gain+=3;toast('🪙 捡到金币，+3 XP')}
    }
    S.xp+=gain;SES.xp+=gain;
    if(gain){
      const q=document.getElementById('qcard');
      const f=document.createElement('div');f.className='xpfloat';f.textContent='+'+gain+' XP';
      q.appendChild(f);setTimeout(()=>f.remove(),1000);
    }
    const fb=document.getElementById('fb');
    fb.textContent=['真棒！🎉','好厉害！👍','完全正确！✨','拼得漂亮！🌟'][Math.floor(Math.random()*4)];
    fb.className='fb good';
    SES.queue.shift();
    renderBoard();
    save();checkBadges();
    setTimeout(nextCard,900);
  }else{
    S.combo=0;
    if(!CUR.attempted){
      SES.wrong++;day.w++;
      if(CUR.mode==='review'){st.b=1;st.d=addDays(1);st.wr++;S.rev++;day.rv++}
      if(CUR.mode==='learn'&&!S.w[CUR.id]){/* 学习模式首错不入库，答对时才入库 */}
    }
    CUR.attempted=true;CUR.retry=(CUR.retry||0)+1;
    save();
    // 重拼同一个词
    setTimeout(()=>{SLOTS.forEach(s=>{s.val='';s.el.textContent=s.el.classList.contains('fix')?s.el.textContent:'';s.el.classList.remove('bad','ok')});
      // 错2次后给灰色描红
      if(CUR.retry>=2)SLOTS.forEach(s=>{s.el.textContent=s.ch.toLowerCase();s.el.classList.add('ghost')});
      POS=0;markCursor();CUR._locked=false;
    },1600);
  }
}
function endSession(quit){
  IN_SESSION=false;
  const total=SES.right+SES.wrong;
  document.getElementById('res-emoji').textContent=quit?'💾':SES.wrong===0&&total>0?'🏆':'🎉';
  document.getElementById('res-title').textContent=quit?'进度已保存':SES.wrong===0&&total>0?'全对！太厉害了！':'完成啦！';
  document.getElementById('res-sub').textContent=SES.mode==='challenge'?'整篇课文都闯关完啦！明天记得回来复习 🌱':SES.mode==='review'?'记忆小种子又长大了一点 🌱':'温故而知新！';
  document.getElementById('res-right').textContent=SES.right;
  document.getElementById('res-wrong').textContent=SES.wrong;
  document.getElementById('res-xp').textContent='+'+SES.xp;
  if(!quit&&SES.wrong===0&&total>0){confetti();beep('win')}
  save();checkBadges();
  go('result');
  document.getElementById('scr-result').classList.add('on');
  const pend=PENDING_BADGES.slice();PENDING_BADGES=[];
  if(pend.length)setTimeout(()=>pend.forEach(enqueueBadge),600);
}

/* ================= 统计页 ================= */
function renderStats(){
  document.getElementById('s-learned').textContent=learnedCount();
  document.getElementById('s-master').textContent=masterCount();
  let r=0,w=0;Object.values(S.days).forEach(d=>{r+=d.r;w+=d.w});
  document.getElementById('s-acc').textContent=(r+w)?Math.round(r/(r+w)*100)+'%':'-';
  document.getElementById('s-streak').textContent=S.streak;
  document.getElementById('s-rev').textContent=S.rev;
  document.getElementById('s-units').textContent=doneUnits()+'/72';
  const ch=document.getElementById('chart'),xs=document.getElementById('chart-x');
  ch.innerHTML='';xs.innerHTML='';
  const days=[];for(let i=13;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);days.push(todayStr(d))}
  const vals=days.map(d=>{const x=S.days[d];return x?x.r+x.w:0});
  const mx=Math.max(...vals,1);
  days.forEach((d,i)=>{
    const b=document.createElement('div');b.className='bar';b.style.height=Math.max(vals[i]/mx*100,3)+'%';
    if(vals[i])b.innerHTML=`<i>${vals[i]}</i>`;
    ch.appendChild(b);
    const s=document.createElement('span');s.textContent=+d.slice(8);xs.appendChild(s);
  });
  const pct=learnedCount()/TOTAL_WORDS*100;
  document.getElementById('s-total-fill').style.width=pct+'%';
  document.getElementById('s-total-txt').textContent=`已学 ${learnedCount()} / ${TOTAL_WORDS} 个单词（${Math.round(pct)}%）`;
}

/* ================= 勋章页 ================= */
function renderBadges(){
  const g=document.getElementById('badge-grid');g.innerHTML='';
  BADGES.forEach(b=>{
    const got=S.badges.includes(b.id);
    const d=document.createElement('div');d.className='badge'+(got?' got':'');
    d.innerHTML=`<span>${b.e}</span><b>${b.n}</b><i>${b.d}</i>`;
    g.appendChild(d);
  });
}

/* ================= 设置页 ================= */
function renderSettings(){
  document.getElementById('set-rate').value=S.set.rate;
  document.getElementById('set-sound').value=S.set.sound?'开':'关';
}
function exportData(){
  const blob=new Blob([JSON.stringify(S)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='新概念单词岛进度_'+todayStr()+'.json';a.click();
  toast('已导出备份文件 📤');
}
function importData(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=()=>{try{const d=JSON.parse(r.result);if(d&&d.w!==undefined){S=d;save();toast('导入成功 ✅');renderSettings();renderHome()}else toast('文件格式不对哦')}catch(e){toast('文件格式不对哦')}};
  r.readAsText(f);inp.value='';
}
function resetAll(){
  ask('确定要<b>清空全部学习进度</b>吗？<br>此操作不能撤销，建议先导出备份！','清空进度',()=>{
    localStorage.removeItem(KEY);location.reload();
  });
}

/* ================= 语音输入（说出单词，自动填写） ================= */
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
let REC=null;
function onVoice(){
  if(!SR){toast('这个浏览器不支持语音输入哦');return;}
  if(!CUR||CUR.phase!=='spell')return;
  if(REC){try{REC.stop()}catch(e){}REC=null;return;}
  const mic=document.getElementById('btn-voice');
  try{
    REC=new SR();REC.lang='en-US';REC.maxAlternatives=1;REC.interimResults=false;
    mic.textContent='🎙️ 听着…';
    REC.onresult=e=>{
      let heard='';for(let i=0;i<e.results.length;i++)heard+=e.results[i][0].transcript;
      fillFromVoice(heard);
    };
    REC.onerror=ev=>{toast(ev.error==='not-allowed'?'请允许麦克风权限 🎤':'没听清，再试一次 🎤');};
    REC.onend=()=>{mic.textContent='🎤 说单词';REC=null;};
    REC.start();
  }catch(err){mic.textContent='🎤 说单词';REC=null;toast('语音启动失败');}
}
function fillFromVoice(raw){
  if(!CUR||CUR.phase!=='spell')return;
  const letters=(raw||'').toLowerCase().replace(/[^a-z]/g,'');
  if(!letters){toast('没听清，再试一次 🎤');return;}
  SLOTS.forEach(s=>{s.val='';s.el.textContent='';s.el.classList.remove('ghost','ok','bad')});
  for(let i=0;i<SLOTS.length&&i<letters.length;i++){SLOTS[i].val=letters[i];SLOTS[i].el.textContent=letters[i]}
  POS=Math.min(letters.length,SLOTS.length);markCursor();
  const fb=document.getElementById('fb');fb.textContent='🎤 听到：'+raw.trim();fb.className='fb';
  if(SLOTS.every(s=>s.val))setTimeout(check,300);
}
if(!SR){const v=document.getElementById('btn-voice');if(v)v.style.display='none';}

/* ================= 物理键盘支持（外接键盘） ================= */
document.addEventListener('keydown',e=>{
  if(!document.getElementById('scr-sess').classList.contains('on'))return;
  if(/^[a-zA-Z]$/.test(e.key))onKey(e.key.toLowerCase());
  else if(e.key==='Backspace')onKey('BS');
});

/* 启动 */
go('home');
</script>
